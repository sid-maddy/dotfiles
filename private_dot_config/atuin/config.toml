## Sync after every command — daemon batches writes efficiently
auto_sync = true

## Enable automatic update checks
update_check = true

## Sync after every command (0 = immediate); daemon handles batching
sync_frequency = "0"

## daemon-fuzzy: fastest mode — in-memory index via background daemon
## Requires [daemon] enabled = true below
search_mode = "daemon-fuzzy"

## Global search by default; ctrl-r cycles through modes
filter_mode = "global"

## Enable git-repo-aware workspace filtering
workspaces = true

## Up-arrow: scope to current directory (contextual recall)
filter_mode_shell_up_key_binding = "directory"
search_mode_shell_up_key_binding = "fuzzy"

## Compact = more history rows visible
style = "compact"

## Search bar at the top (natural reading order)
invert = true

## 40 lines max — good balance of visibility without full-screen takeover
inline_height = 40

## Preview long commands that get clipped
show_preview       = true
max_preview_height = 4

## Show version/keymap hints and tab bar
show_help = true
show_tabs = true

## Escape returns original command (safe default)
exit_mode = "return-original"

## macOS: Ctrl+0..9 instead of Alt+0..9 (Alt/Option conflicts with special chars)
ctrl_n_shortcuts = true

## Filter additional sensitive / noisy patterns from history
history_filter = [
  "^export \\w*TOKEN=",
  "^export \\w*SECRET=",
  "^export \\w*KEY=",
  "^export \\w*PASSWORD=",
  "^atuin login",
  "^atuin register",
  " --password[= ]",
  "^vault login",
  "^vault token",
]

## Auto-filter secrets (AWS keys, GitHub PATs, Slack tokens, Stripe keys, etc.)
secrets_filter = true

## Execute on enter; tab to edit first
enter_accept = true

## Auto-detect vi vs emacs from shell keymap
keymap_mode = "auto"

## Keep failed commands — useful for post-mortem debugging
store_failed = true

## Build command chains with && or || from search results
command_chaining = true

[stats]
## Track subcommands for tools you actually use
common_subcommands = [
  "az",
  "cargo",
  "docker",
  "git",
  "go",
  "helm",
  "jj",
  "kubectl",
  "make",
  "mise",
  "nix",
  "npm",
  "pnpm",
  "podman",
  "ruff",
  "systemctl",
  "terraform",
  "tmux",
  "uv",
  "yarn",
]

## Strip sudo from stats
common_prefix = ["sudo"]

## Ignore trivial navigation commands
ignored_commands = ["cd", "ls", "ll", "la", "l", "clear", "pwd", "exit"]

[keys]
scroll_exits = true

[sync]
records = true

[preview]
strategy = "auto"

[daemon]
## Speeds up DB writes, enables background sync, powers daemon-fuzzy search
enabled = true
## CLI auto-starts the daemon — no manual `atuin daemon` needed
autostart = true
## Background sync every 5 min
sync_frequency = 300

[theme]
name = "ayu-dark"

[search]
## Filter mode cycle order (ctrl-r)
filters = ["global", "host", "session", "workspace", "directory"]

## Scoring: bias toward recent commands (what you ran 5 min ago > 5 months ago)
recency_score_multiplier   = 3.0
frequency_score_multiplier = 1.0
frecency_score_multiplier  = 1.5

[dotfiles]
## Sync shell aliases across machines (requires sync v2)
enabled = true

[ai]
enabled = false
